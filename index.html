<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RepaCel - Panel Técnico</title>
    <style>
        /* Estilos generales modernos y oscuros */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        /* Contenedor del Login */
        .login-container { background-color: #1e1e1e; border: 1px solid #333; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); text-align: center; }
        h2 { margin-bottom: 20px; color: #00adb5; font-size: 24px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 6px; color: #aaaaaa; font-size: 14px; }
        .input-group input { width: 100%; padding: 12px; background-color: #2d2d2d; border: 1px solid #444; border-radius: 6px; color: white; font-size: 16px; outline: none; transition: border 0.3s; }
        .input-group input:focus { border-color: #00adb5; }
        
        button { width: 100%; padding: 12px; background-color: #00adb5; color: #121212; font-weight: bold; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #00f5ff; }
        
        /* Panel Oculto (Se muestra al entrar correctamente) */
        #adminPanel { background-color: #1e1e1e; border: 2px solid #00adb5; padding: 40px; border-radius: 12px; width: 100%; max-width: 800px; margin-top: 20px; text-align: center; box-shadow: 0 8px 30px rgba(0, 173, 181, 0.2); }
        .panel-header { color: #00adb5; margin-bottom: 15px; }
        
        /* Clase para ocultar elementos */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginBox" class="login-container">
        <h2>RepaCel - Ingreso</h2>
        <div class="input-group">
            <label for="usuario">Usuario Técnico</label>
            <input type="text" id="usuario" placeholder="Ej: admin" autocomplete="off">
        </div>
        <div class="input-group">
            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" placeholder="••••••••">
        </div>
        <button onclick="login()">Iniciar Sesión</button>
    </div>

    <div id="adminPanel" class="hidden">
        <h1 class="panel-header">¡Acceso Autorizado!</h1>
        <p>Bienvenido al Sistema de Gestión de Reparaciones de <strong>RepaCel</strong>.</p>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #333;">
        <p style="color: #888;">[ Acá podés continuar metiendo el resto de tus herramientas, tablas o datos del taller ]</p>
    </div>

    <script>
        // 1. Función obligatoria asíncrona para calcular el SHA-256 en el navegador
        async function generarSHA256(mensaje) {
            const msgBuffer = new TextEncoder().encode(mensaje);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // 2. Función de validación del Login
        async function login() {
            const usuarioInput = document.getElementById('usuario').value.trim();
            const contrasenaInput = document.getElementById('contrasena').value; 

            // === HASH DE LA CONTRASEÑA ===
            // Este hash corresponde exactamente a la palabra: loot2026
            const hashEsperado = "7864f1e311229048a1a47321e25e0e0f76906a5b4be4cf4a179619572635a9b3"; 

            // Calculamos el hash de lo que el usuario escribió
            const hashIngresado = await generarSHA256(contrasenaInput);

            // Ayuda técnica en Consola (F12) para revisar errores de tipeo
            console.log("--- INTENTO DE CONEXIÓN ---");
            console.log("Usuario ingresado:", usuarioInput);
            console.log("Hash generado en vivo:", hashIngresado);

            // Verificación estricta
            if (usuarioInput === "admin" && hashIngresado === hashEsperado) {
                // Login correcto: ocultamos el login y mostramos el sistema
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
            } else {
                // Login incorrecto
                alert("Acceso denegado: Usuario o contraseña incorrectos.");
            }
        }
    </script>

</body>
</html>
