<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOOT Hardware Lab | Inicio y Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .group:hover .mega-menu { display: block; }
    </style>
</head>
<body class="bg-[#0b0b0b] text-neutral-200 min-h-screen flex flex-col selection:bg-[#00ffcc] selection:text-black">

    <header class="border-b border-neutral-900 bg-[#121212] sticky top-0 z-40">
        <div class="max-w-6xl mx-auto w-full h-20 flex items-center justify-between px-6 relative">
            <a href="#" onclick="showSection('inicio')" class="cursor-pointer">
                <img src="./img/pnglogo.png" alt="LOOT Logo" class="h-16 w-auto object-contain">
            </a>
            
            <nav class="hidden md:flex items-center gap-8 mx-auto font-mono text-xs tracking-wider">
                <button onclick="showSection('inicio')" id="nav-inicio" class="text-[#00ffcc] font-bold cursor-pointer">INICIO</button>
                <button onclick="filterCategory('TODOS')" id="nav-catalogo" class="text-neutral-400 hover:text-[#00ffcc] transition-colors cursor-pointer">CATÁLOGO_COMPLETO</button>
                
                <div class="relative group py-7">
                    <button class="text-neutral-400 group-hover:text-[#00ffcc] transition-colors flex items-center gap-1 cursor-pointer">
                        REPARACIONES <span class="text-[9px] text-neutral-600">▼</span>
                    </button>
                    <div class="mega-menu hidden absolute top-full left-1/2 -translate-x-1/2 w-[500px] bg-[#121212] border border-neutral-800 rounded-xl p-6 shadow-2xl mt-1">
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <h4 class="text-[#00ffcc] text-[11px] border-b border-neutral-800 pb-2 mb-3">// POR_MARCA</h4>
                                <ul class="space-y-2 text-neutral-400 font-sans text-sm">
                                    <li><button onclick="filterCategory('IPHONE')" class="hover:text-white transition-colors w-full text-left cursor-pointer">Apple iPhone</button></li>
                                    <li><button onclick="filterCategory('SAMSUNG')" class="hover:text-white transition-colors w-full text-left cursor-pointer">Samsung Galaxy</button></li>
                                    <li><button onclick="filterCategory('MOTOROLA')" class="hover:text-white transition-colors w-full text-left cursor-pointer">Motorola Moto</button></li>
                                </ul>
                            </div>
                            <div>
                                <h4 class="text-[#00ffcc] text-[11px] border-b border-neutral-800 pb-2 mb-3">// POR_COMPONENTE</h4>
                                <ul class="space-y-2 text-neutral-400 font-sans text-sm">
                                    <li><button onclick="filterCategory('DISPLAY_FIX')" class="hover:text-white transition-colors w-full text-left cursor-pointer">Pantallas / Módulos</button></li>
                                    <li><button onclick="filterCategory('POWER_CELL')" class="hover:text-white transition-colors w-full text-left cursor-pointer">Baterías</button></li>
                                    <li><button onclick="filterCategory('MICRO_CORE')" class="hover:text-white transition-colors w-full text-left cursor-pointer">Placas / Soldadura</button></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <div id="view-inicio" class="max-w-6xl w-full mx-auto p-6 my-4 space-y-12">
        <section class="bg-[#121212] border border-neutral-900 rounded-3xl p-8 flex flex-col md:flex-row items-center gap-8">
            <div class="flex-1 space-y-4">
                <h1 class="text-4xl md:text-5xl font-extrabold text-white tracking-tight">Reviví tu dispositivo con precisión.</h1>
                <p class="text-neutral-400">Especialistas en microsoldadura y restauración de hardware.</p>
                <button onclick="filterCategory('TODOS')" class="bg-[#00ffcc] text-black font-bold py-3 px-6 rounded-xl">VER CATÁLOGO</button>
            </div>
            <div class="w-full md:w-1/2 h-64 bg-neutral-950 rounded-2xl overflow-hidden border border-neutral-900">
                <img src="https://images.unsplash.com/photo-1601524909162-be87252be298?w=800" class="w-full h-full object-cover">
            </div>
        </section>

        <section class="space-y-6">
            <h2 class="text-2xl font-extrabold text-white">🔥 Súper Ofertas</h2>
            <div id="ofertas-grilla" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>
    </div>

    <main id="view-catalogo" class="hidden max-w-6xl w-full mx-auto p-6 my-4">
        <div id="catalogo" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <script>
        const productos = [
            { id: 1, title: "Cambio Módulo iPhone 11", price: 18000, img: "https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5?w=500", tag: "IPHONE DISPLAY_FIX", isOffer: true, desc: "Calidad Premium." },
            { id: 2, title: "Batería Motorola", price: 12500, img: "https://images.unsplash.com/photo-1598327105666-5b89351aff97?w=500", tag: "MOTOROLA POWER_CELL", isOffer: true, desc: "Celdas certificadas." }
        ];

        function renderAll() {
            const gridOfertas = document.getElementById('ofertas-grilla');
            const gridCatalogo = document.getElementById('catalogo');
            
            if(gridOfertas) {
                gridOfertas.innerHTML = productos.filter(p => p.isOffer).map(p => buildCard(p)).join('');
            }
            if(gridCatalogo) {
                gridCatalogo.innerHTML = productos.map(p => buildCard(p)).join('');
            }
        }

        function buildCard(p) {
            return `
                <div class="bg-[#121212] border border-neutral-900 rounded-xl p-5 hover:border-[#00ffcc] transition-all">
                    <img src="${p.img}" class="w-full h-40 object-cover rounded mb-4">
                    <h3 class="text-white font-bold">${p.title}</h3>
                    <p class="text-[#00ffcc] font-mono mt-2">$${p.price.toLocaleString()}</p>
                </div>
            `;
        }

        function showSection(s) {
            document.getElementById('view-inicio').classList.toggle('hidden', s !== 'inicio');
            document.getElementById('view-catalogo').classList.toggle('hidden', s !== 'catalogo');
        }

        function filterCategory(cat) {
            showSection('catalogo');
            // Lógica de filtrado...
        }

        // Ejecución al cargar
        document.addEventListener('DOMContentLoaded', renderAll);
    </script>
</body>
</html>
